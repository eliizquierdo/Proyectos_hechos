<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formulario de Registro</title>
  </head>
  <body>
    <h1>Registro de Estudiantes</h1>

    <form action="ProcesarRegistro" method="post">
      <!-- Datos personales -->
      <h2>Datos Personales</h2>
	  <!-- Etiqueta -->
      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" required />
      <br />
      <label for="email">Email:</label>
      <!-- input tipo email-->
      <input type="email" id="email" name="email" required />
     
      <!-- input tipo number-->
      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="15" max="25" /><br />

      <!-- Información académica -->
      <h2>Información Académica</h2>
      
      <label for="grado">Grado:</label>
      <!-- Lista desplegable-->
      <select id="grado" name="grado" required>
       
        <option value="">Selecciona...</option>
        <option value="10">Décimo</option>
        <option value="11">Undécimo</option>
      </select>
      <br />

      <p>¿Qué modalidad prefieres?</p>
      <!-- input tipo radio button-->
      <input type="radio" id="presencial" name="modalidad" value="presencial" />
      
      <label for="presencial">Presencial</label>
            <input type="radio" id="virtual" name="modalidad" value="virtual" />
      <label for="virtual">Virtual</label>
      <br />

      <p>¿Qué materias te interesan más?</p>
      <!-- input tipo checkbox-->
      <input
        type="checkbox"
        id="matematicas"
        name="materias"
        value="matematicas"
      />
      
      <label for="matematicas">Matemáticas</label>
      <input type="checkbox" id="ciencias" name="materias" value="ciencias" />
      <label for="ciencias">Ciencias</label>
      
      <input
        type="checkbox"
        id="programacion"
        name="materias"
        value="programacion"
      />
      <label for="programacion">Programación</label>
      <br />

      <label for="comentarios">Comentarios adicionales:</label>
      <br />
      <textarea
        id="comentarios"
        name="comentarios"
        rows="4"
        cols="50"
        placeholder="Cuéntanos algo más sobre ti..."
      >
      </textarea>
      <br />

      <!-- Términos y botones -->
      <input type="checkbox" id="acepto" name="acepto" required />
      <label for="acepto">Acepto los términos y condiciones</label>
      <br />
      <!-- Botón de envio-->
      <input type="submit" value="Registrarme" />
      <!-- Botón de reset-->
      <input type="reset" value="Limpiar Formulario" />
      
    </form>
  </body>
</html>
